300M0000024bjiL2aocxT_3.jpg?max_age=2592000","lrc":"https://npm.elemecdn.com/anzhiyu-music@1.0.3/发如雪/发如雪.lrc"},{"name":"以父之名","artist":"周杰伦","url":"https://npm.elemecdn.com/anzhiyu-music@1.0.3/以父之名/以父之名.mp3","cover":"https://y.qq.com/music/photo_new/T002R300x300M000000MkMni19ClKG_3.jpg?max_age=2592000","lrc":"https://npm.elemecdn.com/anzhiyu-music@1.0.3/以父之名/以父之名.lrc"},{"name":"园游会","artist":"周杰伦","url":"https://npm.elemecdn.com/anzhiyu-music@1.0.3/园游会/园游会.flac","cover":"https://y.qq.com/music/photo_new/T002R300x300M000003DFRzD192KKD_1.jpg?max_age=2592000","lrc":"https://npm.elemecdn.com/anzhiyu-music@1.0.3/园游会/园游会.lrc"},{"name":"本草纲目","artist":"周杰伦","url":"https://npm.elemecdn.com/anzhiyu-music@1.0.4/本草纲目/本草纲目.mp3","cover":"https://y.qq.com/music/photo_new/T002R300x300M000002jLGWe16Tf1H_1.jpg?max_age=2592000","lrc":"https://npm.elemecdn.com/anzhiyu-music@1.0.4/本草纲目/本草纲目.lrc"},{"name":"龙卷风","artist":"周杰伦","url":"https://npm.elemecdn.com/anzhiyu-music@1.0.4/龙卷风/龙卷风.mp3","cover":"https://y.qq.com/music/photo_new/T002R300x300M000000f01724fd7TH_1.jpg?max_age=2592000","lrc":"https://npm.elemecdn.com/anzhiyu-music@1.0.4/龙卷风/龙卷风.lrc"}];

      let currentSongIdx = 0;
      let isPlaying = false;

      const initAudio = (audio) => {
        if (songs.length > 0 && !audio.src) {
          audio.src = songs[0].url;
          audio.volume = 0.7;
        }
      };

      const setupGlobalActions = () => {
        // Theme toggle listener (re-bind on page load)
        const themeToggle = document.getElementById("theme-toggle");
        if (themeToggle) {
          themeToggle.onclick = () => {
            const element = document.documentElement;
            const currentTheme = element.getAttribute("data-theme");
            const newTheme = currentTheme === "light" ? "dark" : "light";
            element.setAttribute("data-theme", newTheme);
            localStorage.setItem("theme", newTheme);
            window.dispatchEvent(new CustomEvent('theme-changed', { detail: { theme: newTheme } }));
          };
        }

        // Mobile Nav panel toggle
        const mobileToggle = document.getElementById("mobile-toggle");
        const mobileNav = document.getElementById("mobile-nav");
        if (mobileToggle) {
          mobileToggle.onclick = () => {
            mobileNav?.classList.toggle("open");
          };
        }
        document.querySelectorAll(".mobile-nav-item").forEach(link => {
          link.onclick = () => {
            mobileNav?.classList.remove("open");
          };
        });

        // Settings popup panel toggle
        const settingsToggle = document.getElementById("settings-toggle");
        const settingsPopup = document.getElementById("settings-popup");
        if (settingsToggle) {
          settingsToggle.onclick = (e) => {
            e.stopPropagation();
            settingsPopup?.classList.toggle("open");
          };
        }
        document.onclick = (e) => {
          if (!settingsPopup?.contains(e.target) && e.target !== settingsToggle) {
            settingsPopup?.classList.remove("open");
          }
        };

        // Accent theme colors buttons
        const colorBtns = document.querySelectorAll(".color-opt-btn");
        const currentAccent = document.documentElement.getAttribute("data-accent") || "purple";
        colorBtns.forEach(btn => {
          const color = btn.getAttribute("data-color");
          if (color === currentAccent) {
            btn.classList.add("active");
          } else {
            btn.classList.remove("active");
          }
          btn.onclick = () => {
            colorBtns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            document.documentElement.setAttribute("data-accent", color);
            localStorage.setItem("accent-color", color);
            window.dispatchEvent(new CustomEvent('accent-changed', { detail: { color } }));
          };
        });

        // Header dynamic hide on scroll down, show on scroll up
        let lastScrollY = window.scrollY;
        const navbar = document.querySelector(".navbar-wrapper");
        window.onscroll = () => {
          if (!navbar) return;
          const currentScrollY = window.scrollY;
          // Hide header if scroll down past 100px
          if (currentScrollY > 100 && currentScrollY > lastScrollY) {
            navbar.classList.add("navbar-hidden");
          } else {
            navbar.classList.remove("navbar-hidden");
          }
          lastScrollY = currentScrollY;

          // Back to top visibility listener
          const backToTopBtn = document.getElementById("sidebar-back-to-top");
          if (backToTopBtn) {
            if (currentScrollY > 300) {
              backToTopBtn.classList.add("visible");
            } else {
              backToTopBtn.classList.remove("visible");
            }
          }
        };

        // Sidebar controls
        const backToTopBtn = document.getElementById("sidebar-back-to-top");
        if (backToTopBtn && !backToTopBtn.dataset.hasListener) {
          backToTopBtn.dataset.hasListener = "true";
          backToTopBtn.onclick = () => {
            window.scrollTo({ top: 0, behavior: "smooth" });
          };
        }

        const musicToggleBtn = document.getElementById("sidebar-music-toggle");
        const miniPlayer = document.getElementById("global-mini-player");
        if (musicToggleBtn && !musicToggleBtn.dataset.hasListener) {
          musicToggleBtn.dataset.hasListener = "true";
          musicToggleBtn.onclick = () => {
            miniPlayer?.classList.toggle("open");
          };
        }

        // Global Audio init & event bindings
        const audio = document.getElementById("global-audio-element");
        if (audio) {
          initAudio(audio);
        }

        const miniPlayBtn = document.getElementById("mini-ctrl-play");
        const miniNextBtn = document.getElementById("mini-ctrl-next");
        const miniCover = document.getElementById("mini-player-cover");
        const miniTitle = document.getElementById("mini-player-title");
        const miniArtist = document.getElementById("mini-player-artist");
        const miniFill = document.getElementById("mini-progress-fill");

        const updateMiniUI = () => {
          if (!audio || songs.length === 0) return;
          const song = songs[currentSongIdx];
          if (miniTitle) miniTitle.textContent = song.name;
          if (miniArtist) miniArtist.textContent = song.artist;
          if (miniCover) miniCover.src = song.cover;

          if (audio.paused) {
            miniPlayBtn?.querySelector(".mini-icon-play").setAttribute("style", "display: block;");
            miniPlayBtn?.querySelector(".mini-icon-pause").setAttribute("style", "display: none;");
            miniCover?.classList.remove("playing");
          } else {
            miniPlayBtn?.querySelector(".mini-icon-play").setAttribute("style", "display: none;");
            miniPlayBtn?.querySelector(".mini-icon-pause").setAttribute("style", "display: block;");
            miniCover?.classList.add("playing");
          }
        };

        const loadGlobalSong = (idx) => {
          if (!audio || idx < 0 || idx >= songs.length) return;
          currentSongIdx = idx;
          const song = songs[idx];
          audio.src = song.url;
          updateMiniUI();
          if (isPlaying) {
            audio.play().catch(() => {
              isPlaying = false;
              updateMiniUI();
            });
          }
          window.dispatchEvent(new CustomEvent('song-loaded', { detail: { index: idx } }));
        };

        if (miniPlayBtn && !miniPlayBtn.dataset.hasListener) {
          miniPlayBtn.dataset.hasListener = "true";
          miniPlayBtn.onclick = () => {
            if (!audio) return;
            if (audio.paused) {
              audio.play().then(() => {
                isPlaying = true;
                updateMiniUI();
                window.dispatchEvent(new CustomEvent('playback-changed', { detail: { playing: true } }));
              }).catch(() => {
                isPlaying = false;
                updateMiniUI();
              });
            } else {
              audio.pause();
              isPlaying = false;
              updateMiniUI();
              window.dispatchEvent(new CustomEvent('playback-changed', { detail: { playing: false } }));
            }
          };
        }

        if (miniNextBtn && !miniNextBtn.dataset.hasListener) {
          miniNextBtn.dataset.hasListener = "true";
          miniNextBtn.onclick = () => {
            let idx = currentSongIdx + 1;
            if (idx >= songs.length) idx = 0;
            isPlaying = true;
            loadGlobalSong(idx);
          };
        }

        if (audio && !audio.dataset.hasListener) {
          audio.dataset.hasListener = "true";

          audio.ontimeupdate = () => {
            const cur = audio.currentTime;
            const dur = audio.duration || 0;
            if (dur > 0 && miniFill) {
              miniFill.style.width = (cur / dur) * 100 + "%";
            }
          };

          audio.onended = () => {
            let idx = currentSongIdx + 1;
            if (idx >= songs.length) idx = 0;
            isPlaying = true;
            loadGlobalSong(idx);
          };

          audio.onplay = () => {
            isPlaying = true;
            updateMiniUI();
          };

          audio.onpause = () => {
            isPlaying = false;
            updateMiniUI();
          };
        }

        // Trigger updates once on page load
        updateMiniUI();
      };

      // Connect standard transitions & immediate load triggers
      document.addEventListener("DOMContentLoaded", setupGlobalActions);
      document.addEventListener("astro:page-load", setupGlobalActions);

      // Core communications from pages
      window.addEventListener('request-song-load', (e) => {
        isPlaying = true;
        currentSongIdx = e.detail.index;
        const audio = document.getElementById("global-audio-element");
        if (audio && songs[currentSongIdx]) {
          audio.src = songs[currentSongIdx].url;
          const miniPlayBtn = document.getElementById("mini-ctrl-play");
          const miniCover = document.getElementById("mini-player-cover");
          const miniTitle = document.getElementById("mini-player-title");
          const miniArtist = document.getElementById("mini-player-artist");
          if (miniTitle) miniTitle.textContent = songs[currentSongIdx].name;
          if (miniArtist) miniArtist.textContent = songs[currentSongIdx].artist;
          if (miniCover) miniCover.src = songs[currentSongIdx].cover;
          audio.play().catch(() => {
            isPlaying = false;
          });
        }
      });

      window.addEventListener('request-playback-toggle', () => {
        const miniPlayBtn = document.getElementById("mini-ctrl-play");
        if (miniPlayBtn) miniPlayBtn.click();
      });
    })();</script> </body> </html>
