<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="123" height="20" role="img" aria-label="Blog: 1 min read">
  <title>Blog: 1 min read</title>
  <linearGradient id="s" x2="0" y2="100%">
    <stop offset="0" stop-color="#bbb" stop-opacity=".1"/>
    <stop offset="1" stop-opacity=".1"/>
  </linearGradient>
  <clipPath id="r">
    <rect width="123" height="20" rx="3" fill="#fff"/>
  </clipPath>
  <g clip-path="url(#r)">
    <rect width="42" height="20" fill="#555"/>
    <rect x="42" width="81" height="20" fill="#f59e0b"/>
    <rect width="123" height="20" fill="url(#s)"/>
  </g>
  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="110">
    <text aria-hidden="true" x="210" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="300">Blog</text>
    <text x="210" y="140" transform="scale(.1)" fill="#fff" textLength="300">Blog</text>
    <text aria-hidden="true" x="825" y="150" fill="#010101" fill-opacity=".3" transform="scale(.1)" textLength="690">1 min read</text>
    <text x="825" y="140" transform="scale(.1)" fill="#fff" textLength="690">1 min read</text>
  </g>
</svg>