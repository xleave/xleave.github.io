        }

        lyricsTrack.innerHTML = parsedLyrics.map((lyric, idx) => (
          `<p class="lyric-line" id="lyric-line-${idx}">${lyric.text}</p>`
        )).join('');
      } catch (err) {
        lyricsTrack.innerHTML = '<p class="lyrics-empty">暂无歌词或加载失败</p>';
      }
    };

    // Load and play a specific song
    const loadSong = (idx) => {
      if (!audio || idx < 0 || idx >= songs.length) return;
      currentIdx = idx;
      const song = songs[idx];

      // Update active queue item styles
      queueItems.forEach((item, i) => {
        if (i === idx) {
          item.classList.add('active');
          item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        } else {
          item.classList.remove('active');
        }
      });

      // Update player panel metadata
      audio.src = song.url;
      playerCover.src = song.cover;
      playerTitle.textContent = song.name;
      playerArtist.textContent = song.artist;
      progressSlider.value = 0;
      timeCurrent.textContent = '0:00';

      // Load lyrics
      loadLyrics(song.lrc);

      if (isPlaying) {
        audio.play().catch(() => {
          setPlaybackState(false);
        });
      }
    };

    const setPlaybackState = (play) => {
      isPlaying = play;
      if (play) {
        playBtn.querySelector('.icon-play').style.display = 'none';
        playBtn.querySelector('.icon-pause').style.display = 'block';
        disc.classList.add('playing');
        arm.classList.add('playing');
      } else {
        playBtn.querySelector('.icon-play').style.display = 'block';
        playBtn.querySelector('.icon-pause').style.display = 'none';
        disc.classList.remove('playing');
        arm.classList.remove('playing');
      }
    };

    // Play/Pause button trigger
    playBtn?.addEventListener('click', () => {
      if (!audio) return;
      if (isPlaying) {
        audio.pause();
        setPlaybackState(false);
      } else {
        audio.play()
          .then(() => setPlaybackState(true))
          .catch(() => setPlaybackState(false));
      }
    });

    // Prev / Next button triggers
    prevBtn?.addEventListener('click', () => {
      let idx = currentIdx - 1;
      if (idx < 0) idx = songs.length - 1;
      loadSong(idx);
    });

    nextBtn?.addEventListener('click', () => {
      let idx = currentIdx + 1;
      if (idx >= songs.length) idx = 0;
      loadSong(idx);
    });

    // Auto next on song end
    audio?.addEventListener('ended', () => {
      let idx = currentIdx + 1;
      if (idx >= songs.length) idx = 0;
      loadSong(idx);
    });

    // Volume Slider listener
    volumeSlider?.addEventListener('input', (e) => {
      if (audio) {
        audio.volume = parseFloat(e.target.value);
      }
    });

    // Time update listener (handles progress slider & lyrics highlight)
    audio?.addEventListener('timeupdate', () => {
      const curTime = audio.currentTime;
      const durTime = audio.duration || 0;

      // Update progress inputs
      if (durTime > 0) {
        progressSlider.value = (curTime / durTime) * 100;
      }
      timeCurrent.textContent = formatTime(curTime);

      // Highlight corresponding lyric line
      if (parsedLyrics.length > 0) {
        let activeLineIdx = 0;
        for (let i = 0; i < parsedLyrics.length; i++) {
          if (curTime >= parsedLyrics[i].time) {
            activeLineIdx = i;
          } else {
            break;
          }
        }

        // Apply highlighting classes
        const lines = document.querySelectorAll('.lyric-line');
        lines.forEach((line, i) => {
          if (i === activeLineIdx) {
            line.classList.add('active');
            
            // Auto scroll container
            const activeEl = document.getElementById(`lyric-line-${activeLineIdx}`);
            if (activeEl && lyricsContainer) {
              const containerHeight = lyricsContainer.clientHeight;
              const offsetTop = activeEl.offsetTop;
              const elHeight = activeEl.clientHeight;
              lyricsContainer.scrollTop = offsetTop - (containerHeight / 2) + (elHeight / 2);
            }
          } else {
            line.classList.remove('active');
          }
        });
      }
    });

    // Loaded metadata to show total duration
    audio?.addEventListener('loadedmetadata', () => {
      timeTotal.textContent = formatTime(audio.duration);
    });

    // Drag / click progress slider to seek audio position
    progressSlider?.addEventListener('input', (e) => {
      if (audio && audio.duration) {
        const pct = parseFloat(e.target.value);
        audio.currentTime = (pct / 100) * audio.duration;
      }
    });

    // Queue selection click listener
    queueItems.forEach(item => {
      item.addEventListener('click', () => {
        const idx = parseInt(item.getAttribute('data-index') || '0');
        // Instantly play on click
        isPlaying = true;
        setPlaybackState(true);
        loadSong(idx);
      });
    });

    // Initial Lyrics Load
    loadLyrics(songs[0].lrc);
  });
})();</script>
