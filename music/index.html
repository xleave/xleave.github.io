  const setupMusicPage = () => {
    const audio = document.getElementById('global-audio-element');
    const playBtn = document.getElementById('ctrl-play');
    const prevBtn = document.getElementById('ctrl-prev');
    const nextBtn = document.getElementById('ctrl-next');
    const volumeSlider = document.getElementById('volume-slider');
    const progressSlider = document.getElementById('progress-bar-slider');
    const timeCurrent = document.getElementById('time-current');
    const timeTotal = document.getElementById('time-total');
    
    const vinyl = document.getElementById('cd-vinyl');
    const arm = document.getElementById('cd-tonearm');
    const playerCover = document.getElementById('player-cover');
    const playerTitle = document.getElementById('player-title');
    const playerArtist = document.getElementById('player-artist');
    
    const queueItems = document.querySelectorAll('.queue-item-m3');
    const lyricsTrack = document.getElementById('lyrics-track');
    const lyricsContainer = document.getElementById('lyrics-container');

    if (!audio) return;

    let localIdx = 0;
    let parsedLyrics = [];

    // Helper: format time
    const formatTime = (seconds) => {
      if (isNaN(seconds)) return '0:00';
      const m = Math.floor(seconds / 60);
      const s = Math.floor(seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    };

    // Helper: Find current index by URL
    const syncCurrentSongIndex = () => {
      const src = audio.src;
      if (!src) return 0;
      const index = songs.findIndex(s => src.includes(s.url) || s.url.includes(src));
      return index === -1 ? 0 : index;
    };

    // Helper: Parse LRC lyrics
    const parseLRC = (lrcText) => {
      const lines = lrcText.split('\n');
      const timeReg = /\[(\d+):(\d+)(?:\.(\d+))?\]/;
      const result = [];

      for (let line of lines) {
        const match = timeReg.exec(line);
        if (match) {
          const minutes = parseInt(match[1]);
          const seconds = parseInt(match[2]);
          const milliseconds = match[3] ? parseInt(match[3]) : 0;
          const time = minutes * 60 + seconds + milliseconds / 1000;
          const text = line.replace(timeReg, '').trim();
          if (text) {
            result.push({ time, text });
          }
        }
      }
      return result.sort((a, b) => a.time - b.time);
    };

    // Load lyrics
    const loadLyrics = async (url) => {
      if (!lyricsTrack) return;
      lyricsTrack.innerHTML = '<p class="lyrics-loading">正在读取歌词...</p>';
      parsedLyrics = [];

      if (!url) {
        lyricsTrack.innerHTML = '<p class="lyrics-empty">无歌词数据</p>';
        return;
      }

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error();
        const text = await response.text();
        parsedLyrics = parseLRC(text);

        if (parsedLyrics.length === 0) {
          lyricsTrack.innerHTML = '<p class="lyrics-empty">暂无歌词文本</p>';
          return;
        }

        lyricsTrack.innerHTML = parsedLyrics.map((lyric, idx) => (
          `<p class="lyric-line" id="lyric-line-${idx}">${lyric.text}</p>`
        )).join('');
      } catch (err) {
        lyricsTrack.innerHTML = '<p class="lyrics-empty">歌词获取失败</p>';
      }
    };

    const setPlaybackState = (playing) => {
      if (playing) {
        playBtn?.querySelector('.icon-play')?.setAttribute("style", "display: none;");
        playBtn?.querySelector('.icon-pause')?.setAttribute("style", "display: block;");
        vinyl?.classList.add('playing');
        arm?.classList.add('playing');
      } else {
        playBtn?.querySelector('.icon-play')?.setAttribute("style", "display: block;");
        playBtn?.querySelector('.icon-pause')?.setAttribute("style", "display: none;");
        vinyl?.classList.remove('playing');
        arm?.classList.remove('playing');
      }
    };

    const loadLocalSongUI = (idx) => {
      localIdx = idx;
      const song = songs[idx];
      if (!song) return;

      queueItems.forEach((item, i) => {
        if (i === idx) {
          item.classList.add('active');
        } else {
          item.classList.remove('active');
        }
      });

      if (playerCover) playerCover.src = song.cover;
      if (playerTitle) playerTitle.textContent = song.name;
      if (playerArtist) playerArtist.textContent = song.artist;
      if (progressSlider) progressSlider.value = 0;
      if (timeCurrent) timeCurrent.textContent = '0:00';
      if (timeTotal) timeTotal.textContent = formatTime(audio.duration || 0);

      loadLyrics(song.lrc);
    };

    // Initialize UI matching global audio state
    const currentIdx = syncCurrentSongIndex();
    loadLocalSongUI(currentIdx);
    setPlaybackState(!audio.paused);
    if (volumeSlider) volumeSlider.value = audio.volume;

    // Controls listeners
    playBtn.onclick = () => {
      window.dispatchEvent(new CustomEvent('request-playback-toggle'));
    };

    prevBtn.onclick = () => {
      let idx = localIdx - 1;
      if (idx < 0) idx = songs.length - 1;
      window.dispatchEvent(new CustomEvent('request-song-load', { detail: { index: idx } }));
    };

    nextBtn.onclick = () => {
      let idx = localIdx + 1;
      if (idx >= songs.length) idx = 0;
      window.dispatchEvent(new CustomEvent('request-song-load', { detail: { index: idx } }));
    };

    volumeSlider.oninput = (e) => {
      audio.volume = parseFloat(e.target.value);
    };

    progressSlider.oninput = (e) => {
      if (audio.duration) {
        const pct = parseFloat(e.target.value);
        audio.currentTime = (pct / 100) * audio.duration;
      }
    };

    queueItems.forEach(item => {
      item.onclick = () => {
        const idx = parseInt(item.getAttribute('data-index') || '0');
        window.dispatchEvent(new CustomEvent('request-song-load', { detail: { index: idx } }));
      };
    });

    // Time update listener (bind to global audio)
    audio.ontimeupdate = () => {
      const curTime = audio.currentTime;
      const durTime = audio.duration || 0;

      if (timeCurrent) timeCurrent.textContent = formatTime(curTime);
      if (durTime > 0 && progressSlider) {
        progressSlider.value = (curTime / durTime) * 100;
      }

      // Lyrics sync scrolling
      if (parsedLyrics.length > 0) {
        let activeLineIdx = 0;
        for (let i = 0; i < parsedLyrics.length; i++) {
          if (curTime >= parsedLyrics[i].time) {
            activeLineIdx = i;
          } else {
            break;
          }
        }

        const lines = document.querySelectorAll('.lyric-line');
        lines.forEach((line, i) => {
          if (i === activeLineIdx) {
            line.classList.add('active');
            
            const activeEl = document.getElementById(`lyric-line-${activeLineIdx}`);
            if (activeEl && lyricsContainer) {
              const containerHeight = lyricsContainer.clientHeight;
              const offsetTop = activeEl.offsetTop;
              const elHeight = activeEl.clientHeight;
              // Smooth scroll to center the active lyrics line
              lyricsContainer.scrollTop = offsetTop - (containerHeight / 2) + (elHeight / 2);
            }
          } else {
            line.classList.remove('active');
          }
        });
      }
    };

    audio.onloadedmetadata = () => {
      if (timeTotal) timeTotal.textContent = formatTime(audio.duration);
    };

    audio.onplay = () => {
      setPlaybackState(true);
    };

    audio.onpause = () => {
      setPlaybackState(false);
    };

    // Listen to custom loads from global control
    window.addEventListener('song-loaded', (e) => {
      loadLocalSongUI(e.detail.index);
    });

    window.addEventListener('playback-changed', (e) => {
      setPlaybackState(e.detail.playing);
    });
  };

  // Re-run setup on transitions
  document.addEventListener('astro:page-load', setupMusicPage);
})();</script>
