backend:
  name: github
  repo: xleave/Y4n-CI       # 您的私有源码仓库地址
  branch: main              # 主分支
  base_url: https://decap-oauth-provider.lumo6454.workers.dev # 替换为您部署的 Cloudflare Worker 代理地址
  auth_endpoint: auth       # 对应 Worker 的 /auth 路由

local_backend: true         # 开启本地调试模式（当运行 npm run dev 时，访问 /admin 可以在本地零授权直接编辑文件）

media_folder: "public/img"   # 图片存放目录
public_folder: "/img"        # 图片引用的公共路径

collections:
  # 1. 文章管理 (Posts)
  - name: "posts"
    label: "博文管理"
    folder: "src/content/posts"
    create: true
    slug: "{{slug}}"
    editor:
      preview: false         # 禁用默认的 React 简易预览，专注于书写
    fields:
      - { label: "文章标题", name: "title", widget: "string" }
      - { label: "创建日期", name: "date", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss" }
      - { label: "更新日期 (可选)", name: "updatedDate", widget: "datetime", format: "YYYY-MM-DD HH:mm:ss", required: false }
      - { label: "文章描述", name: "description", widget: "text" }
      - { label: "封面图 (可选)", name: "cover", widget: "image", required: false }
      - { label: "封面说明 (可选)", name: "coverCaption", widget: "string", required: false }
      - { label: "是否作为草稿", name: "draft", widget: "boolean", default: false }
      - { label: "分类", name: "categories", widget: "list", default: ["技术"] }
      - { label: "标签", name: "tags", widget: "list" }
      - { label: "专题系列 (可选)", name: "series", widget: "string", required: false }
      - { label: "专题顺序 (可选)", name: "seriesOrder", widget: "number", value_type: "int", required: false }
      - { label: "内容正文", name: "body", widget: "markdown" }

  # 2. 项目库管理 (Projects)
  - name: "projects"
    label: "项目库管理"
    folder: "src/content/projects"
    create: true
    slug: "{{slug}}"
    editor:
      preview: false
    fields:
      - { label: "项目名称", name: "title", widget: "string" }
      - { label: "项目描述", name: "description", widget: "text" }
      - { label: "起始日期", name: "startDate", widget: "date", format: "YYYY-MM-DD" }
      - { label: "结束日期 (可选)", name: "endDate", widget: "date", format: "YYYY-MM-DD", required: false }
      - { label: "项目封面", name: "cover", widget: "image" }
      - { label: "GitHub 仓库链接 (可选)", name: "github", widget: "string", required: false }
      - { label: "当前状态", name: "status", widget: "select", options: ["active", "maintenance", "archived"] }
      - { label: "关联文章 Slug (可选)", name: "relatedPosts", widget: "list", required: false }
      - { label: "内容正文", name: "body", widget: "markdown" }

  # 3. 随手与即刻管理 (Essays)
  - name: "essays"
    label: "随手与即刻随笔"
    delete: false
    files:
      - name: "essay"
        label: "即刻随笔数据"
        file: "src/data/essay.yml"
        fields:
          - { label: "主标题", name: "title", widget: "string" }
          - { label: "副标题", name: "subTitle", widget: "string" }
          - { label: "小提示", name: "tips", widget: "string" }
          - { label: "按钮文字", name: "buttonText", widget: "string" }
          - { label: "按钮链接", name: "buttonLink", widget: "string" }
          - { label: "显示上限", name: "limit", widget: "number", value_type: "int" }
          - { label: "是否展示在主页", name: "home_essay", widget: "boolean" }
          - { label: "顶部背景图 (可选)", name: "top_background", widget: "image", required: false }
          - name: "essay_list"
            label: "随手与即刻列表"
            widget: "list"
            fields:
              - { label: "内容正文", name: "content", widget: "text" }
              - { label: "发表日期", name: "date", widget: "string", hint: "格式如: 2026/06/15" }
              - { label: "发布地址 (可选)", name: "address", widget: "string", required: false }
              - { label: "客户端来源 (可选)", name: "from", widget: "string", required: false }
              - { label: "心情状态 (可选)", name: "mood", widget: "string", required: false }
              - { label: "关联文章路由 (可选)", name: "link", widget: "string", required: false }
              - { label: "代码片段 (可选)", name: "code", widget: "text", required: false }
              - name: "music"
                label: "关联音乐 (可选)"
                widget: "object"
                required: false
                fields:
                  - { label: "歌名", name: "name", widget: "string", required: false }
                  - { label: "歌手", name: "artist", widget: "string", required: false }
              - label: "配图列表 (可选)"
                name: "image"
                widget: "list"
                required: false
                field:
                  label: "图片"
                  name: "img"
                  widget: "image"
              - name: "video"
                label: "关联视频列表 (可选)"
                widget: "list"
                required: false
                fields:
                  - { label: "视频链接 (mp4)", name: "src", widget: "string" }
                  - { label: "视频标题", name: "title", widget: "string" }
                  - { label: "视频封面图 (可选)", name: "poster", widget: "image", required: false }
                  - { label: "B站视频号 (可选)", name: "bilibili", widget: "string", required: false }
                  - { label: "YouTube 链接 (可选)", name: "youtube", widget: "string", required: false }
